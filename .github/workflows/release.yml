name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  verify:
    name: Verify release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Test
        run: go test -v -race ./...

      - name: Vet
        run: go vet ./...

      - name: Verify module
        run: go mod verify

      - name: Check module is fetchable
        env:
          GOPROXY: https://proxy.golang.org
        run: |
          echo "Tag: ${{ github.ref_name }}"
          echo "Module will be available at:"
          echo "  https://pkg.go.dev/github.com/kra-so/dashamail-go@${{ github.ref_name }}"
